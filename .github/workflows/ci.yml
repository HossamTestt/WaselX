# ─────────────────────────────────────────────────────────────────
# WaselX CI — Lint, Build & Test
# Triggers: Push to main/develop, Pull Requests
# ─────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── 1. Backend Health Check ────────────────────────────────────
  backend-check:
    name: 🔧 Backend Lint & Syntax Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check for syntax errors
        run: node --check src/**/*.js || true

      - name: Verify .env template exists
        run: test -f .env || test -f .env.example

  # ─── 2. Admin Dashboard Build ──────────────────────────────────
  admin-build:
    name: 🖥 Admin Dashboard Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-dist
          path: admin/dist/
          retention-days: 7

  # ─── 3. Mobile JS Check ─────────────────────────────────────────
  mobile-check:
    name: 📱 Mobile JS Syntax Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Expo doctor check
        run: npx expo-doctor || true
